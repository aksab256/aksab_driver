name: aksab_driver
description: "A new Flutter project for Aksab Drivers - Google Maps Migration Version."
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core & Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.1
  firebase_crashlytics: ^4.3.1

  # ✅ Google Maps & Location (الإصدارات المستقرة للتحويل)
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  permission_handler: ^11.3.0

  # 🛑 تم حذف flutter_map و latlong2 لإجبار البناء على إظهار الأخطاء

  # UI & Design
  sizer: ^3.1.3
  font_awesome_flutter: ^10.8.0
  url_launcher: ^6.3.2
  lucide_icons: ^0.257.0
  fl_chart: ^0.69.2

  # Background Services & Notifications
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  flutter_local_notifications: ^17.2.3

  # Utilities & State Management
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  app_settings: ^6.1.1
  share_plus: ^10.1.4
  path_provider: ^2.1.2
  http: ^1.2.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  image_picker: ^1.1.2
  facebook_app_events: ^0.15.2 # تأكد من توافق الإصدار مع أندرويد

  # Printing & PDF
  pdf: ^3.10.8
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# إعدادات الأيقونة
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFB74D"
  adaptive_icon_foreground: "assets/icon/icon.png"

# إعدادات الـ Splash
flutter_native_splash:
  color: "#FFA000"
  image: "assets/icon/icon.png"
  android_12:
    image: "assets/icon/icon.png"
    color: "#FFA000"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    # ملاحظة: ملف الجيوجيسون (GeoJSON) قد لا تحتاجه مع جوجل مابس إلا لو بترسم مناطق مخصصة
    - assets/OSMB-bc319d822a17aa9ad1089fc05e7d4e752460f877.geojson

